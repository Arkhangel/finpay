services:
  app:
    build: .
    image: finpay-service:v1
    ports:
      - "8000:8000"
    environment:
      OPENAI__API_KEY: ${OPENAI__API_KEY}
      OPENAI__HOST: ${OPENAI__HOST:-https://api.groq.com/openai/v1}
      OPENAI__MODEL: ${OPENAI__MODEL:-llama-3.1-8b-instant}
      REDIS__URL: redis://redis:6379/0
      CHAT__DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/finpay
      HOST: 0.0.0.0
      PHOENIX_COLLECTOR_ENDPOINT: http://phoenix:4317
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      phoenix:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"
      - "4317:4317"
    environment:
      PHOENIX_WORKING_DIR: /data
    volumes:
      - phoenix-data:/data

  redis:
    image: redis:7.4-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: finpay
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  redis_data: {}
  phoenix-data: {}
  pg_data: {}
